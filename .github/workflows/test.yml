name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  package:
    name: Package tests (iOS Simulator)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Select simulator
        id: sim
        uses: ./.github/actions/select-simulator
      - name: Test
        run: |
          set -o pipefail
          # The auto-generated `SwipeMenuViewController` scheme includes the
          # test target, so it both builds the library and runs the tests.
          xcodebuild test \
            -scheme SwipeMenuViewController \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Report code coverage
        run: |
          set -euo pipefail
          {
            echo "### Code coverage"
            echo ""
            echo "| Target | Line coverage |"
            echo "|---|---|"
            # List the library targets only; the test bundle's own coverage is noise.
            xcrun xccov view --report --json TestResults.xcresult \
              | jq -r '.targets[] | select(((.name | endswith(".xctest")) or (.name | endswith("Tests"))) | not) | "| \(.name) | \((.lineCoverage * 10000 | round) / 100)% |"'
          } >> "$GITHUB_STEP_SUMMARY"

  example:
    name: Example app build
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'
      - name: Install XcodeGen
        # Pin to a specific release so project generation is reproducible and an
        # upstream XcodeGen change cannot silently break CI.
        env:
          XCODEGEN_VERSION: "2.45.4"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" -o "$RUNNER_TEMP/xcodegen.zip"
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP/xcodegen"
          chmod +x "$RUNNER_TEMP/xcodegen/xcodegen/bin/xcodegen"
          echo "$RUNNER_TEMP/xcodegen/xcodegen/bin" >> "$GITHUB_PATH"
      - name: Generate Xcode project
        # The .xcodeproj is not committed; it is generated from Example/project.yml.
        run: xcodegen generate --spec Example/project.yml
      - name: Select simulator
        id: sim
        uses: ./.github/actions/select-simulator
      - name: Build and test
        run: |
          set -o pipefail
          # The Example scheme builds the app and runs its unit tests.
          xcodebuild test \
            -project Example/Example.xcodeproj \
            -scheme Example \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            CODE_SIGNING_ALLOWED=NO

  docc:
    name: Documentation build
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'
      - name: Build documentation
        run: |
          set -o pipefail
          # Treat DocC warnings (for example broken symbol links) as errors so
          # documentation regressions fail the build.
          xcodebuild docbuild \
            -scheme SwipeMenuViewController \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_DOCC_FLAGS='--warnings-as-errors'
