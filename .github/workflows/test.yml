name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  package:
    name: Package build (iOS Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme SwipeMenuViewController \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  example:
    name: Example app build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Example/Example.xcodeproj \
            -scheme Example \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
